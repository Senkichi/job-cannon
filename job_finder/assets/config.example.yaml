# Job Cannon Configuration
# Copy this file to config.yaml and customize for your job search.

# --- Your job search profile ---
profile:
  # Job titles you're targeting (matched against listing titles)
  target_titles:
    - Data Scientist
    - Senior Data Scientist
  # Work arrangement preference: remote | hybrid | on-site
  work_arrangement: remote
  # Geography list (cities, regions, countries). Leave empty = no location preference
  # (open to any geography for the chosen arrangement). Do not add "Remote" here.
  target_locations: []
  # Example with specific geographies:
  # target_locations:
  #   - San Francisco, CA
  #   - New York, NY
  # ISO 3166-1 alpha-2 country code for your home country (e.g. "US", "GB").
  # Used by the deterministic location_fit override (P3.1) to evaluate remote
  # eligibility and on-site proximity. Optional — when absent, location_fit
  # falls back to the LLM for all cases except clear city/region target matches.
  home_country: "US"
  # Minimum acceptable salary in USD (jobs below 85% of this are auto-excluded)
  min_salary: 100000
  # Companies to watch for new roles from day one. Seeds the ATS scanner
  # watchlist at onboarding so scanning isn't empty until jobs ingest.
  # Derived from your explicit list — never inferred from job titles.
  target_companies: []
  # Industries you're interested in (used by AI scoring)
  industries:
    - Tech
    - SaaS
  # Exclusion rules — jobs matching these are skipped before AI scoring (zero cost)
  exclusions:
    # Title substrings to exclude (case-insensitive)
    title_keywords:
      - intern
      - junior
    # Specific company names to exclude
    companies: []
  # Your key skills (used by AI for fit scoring)
  skills:
    - Python
    - SQL

# --- Job sources ---
sources:
  imap:
    # IMAP email source (stranger-friendly default - uses app password, no OAuth)
    enabled: true
    host: imap.gmail.com
    port: 993
    email: ""
    app_password: ""
    folder: INBOX
    # How many days back to search for job alert emails
    lookback_days: 7
    # Sender addresses for job alert emails (defaults work for standard alerts)
    senders:
      linkedin_alerts: jobalerts-noreply@linkedin.com
      linkedin_jobs: jobs-noreply@linkedin.com
      glassdoor: noreply@glassdoor.com
      indeed: alert@indeed.com
      ziprecruiter: no-reply@ziprecruiter.com
      jobright: noreply@jobright.ai
  gmail:
    # Gmail API source (OAuth power-user path - requires python -m job_finder.gmail_auth)
    enabled: false
  serpapi:
    # Optional: SerpAPI for Google Jobs search (requires paid API key)
    enabled: false
    # Get your key at: https://serpapi.com/manage-api-key
    api_key: ""
    # Max pages to fetch per query (10 results/page, each page = 1 API credit)
    max_pages: 5
    # Optional: max SerpAPI calls per calendar day for the enrichment pipeline
    # (the paid enrichment tier that fills jd_full when all free tiers fail).
    # Persisted in scoring_costs so the cap survives Flask restarts.
    # 0 or absent = uncapped (original behavior). Recommended: 50-200 depending
    # on your plan limits. The enrichment backfill logs today's call count and
    # cap on every run so you can tune this value without guesswork.
    daily_call_cap: 0
    queries:
      - query: Data Scientist
        location: San Francisco Bay Area
  dataforseo:
    # Optional: DataForSEO Google Jobs SERP API — full index, ~$0.87/month at default settings
    # Task-queue API (async: submits tasks, polls for completion, no live endpoint).
    enabled: false
    # Credentials: base64(login:password) — copy from https://app.dataforseo.com/api-access
    api_key: ""
    # Results per query (10-200). Each 10 = 1 billing unit ($0.0006 normal / $0.0012 high).
    # depth=200: full index access, ~$0.10/run max with 8 queries, billed per result returned.
    depth: 200
    # Only ingest jobs posted within this many days (uses posting timestamp, not time_ago string)
    max_age_days: 7
    # Task priority: 1=normal (~5 min, $0.0006/10 results), 2=high (~1 min, $0.0012/10 results)
    priority: 1
    # Seconds between poll retries after the 45s initial wait. 0=disable sleeping (tests only).
    poll_interval_seconds: 30
    # Give up waiting after this many seconds. Partial results returned; remainder abandoned.
    poll_timeout_seconds: 360
    queries:
      - query: Data Scientist
        location: San Francisco Bay Area

  portal_search:
    # Niche job portal discovery. Three tiers:
    #   1a. Always-on free APIs (RemoteOK, Remotive, Himalayas) — zero cost, no keys.
    #   1b. Stage-2 free portals (Jobicy, YC Work at a Startup, USAJobs, Adzuna,
    #       Jooble) — keyless or free-with-registration. Configured below.
    #   2.  Site: SERP queries via DataForSEO for remaining portals — cheap, batched.
    # SerpAPI is NOT used for portal_search (too expensive for site: queries).
    # If DataForSEO is not enabled, only Tier 1 portals are searched.
    # Default true: the onboarding wizard enables this by default so fresh installs
    # get RemoteOK/Remotive/Himalayas results on the first sync without any credentials.
    enabled: true
    keywords:
      - Staff Engineer
      - ML Platform
      - Data Infrastructure
    # Max DataForSEO site: queries per run (caps SERP spend)
    max_serp_queries: 30

    # --- Stage-2 free portals ---
    # Enable each independently. The keyless portals (jobicy, yc_workatastartup)
    # are the lowest-friction onboarding path. The keyed-but-free portals
    # (usajobs / adzuna / jooble) require a one-time signup at the linked
    # registration page in exchange for a generous free tier.

    jobicy:
      # Remote-only job board. No key required.
      # https://jobicy.com/jobs-rss-feed
      enabled: false
    yc_workatastartup:
      # Y Combinator's "Work at a Startup". No key required.
      # Implemented by parsing the Inertia.js page state from
      # https://www.workatastartup.com/jobs — breaks if YC migrates off Inertia.
      enabled: false
    usajobs:
      # US federal government jobs. Free with email registration.
      # Get your key: https://developer.usajobs.gov/apirequest/
      enabled: false
      # The email address used as the User-Agent header (per USAJobs spec).
      user_agent_email: ""
      # The Authorization-Key header value.
      authorization_key: ""
    adzuna:
      # Global jobs aggregator. Free dev tier (~250 calls/day per country).
      # Get your key: https://developer.adzuna.com/signup
      enabled: false
      app_id: ""
      app_key: ""
      # ISO country code: us, gb, au, ca, de, fr, in, sg, etc.
      country: us
    jooble:
      # Global jobs aggregator. Free with email registration.
      # Get your key: https://jooble.org/api/about
      enabled: false
      api_key: ""

  google_cse:
    # Stage 3 — Google Programmable Search Engine (free 100 queries/day quota).
    # Drop-in replacement for the DataForSEO site: query path. Activates only
    # when both api_key and cse_id are set AND dataforseo is not enabled
    # (DataForSEO is preferred when both are configured — it has no daily cap).
    #
    # Setup:
    #   1. Create a Programmable Search Engine at
    #      https://programmablesearchengine.google.com/ — "Search the entire web"
    #   2. Copy the Search engine ID (the cse_id below)
    #   3. Enable the Custom Search API in https://console.cloud.google.com/
    #      and create an API key (the api_key below)
    #
    # Quota: 100 queries/day free, $5 per 1000 thereafter. Job Cannon enforces
    # a 95/day defense-in-depth gate. Per PLAN.md load-bearing decision #8, the
    # scheduler runs CSE-backed portal search once per day, not 3x/day.
    enabled: false
    api_key: ""
    cse_id: ""

# --- Notifications (alerts when sources degrade / pipeline stalls) ---
notifications:
  desktop:
    enabled: true        # native OS toast (no setup required)
  email:
    enabled: false       # optional durable fallback; reuses the IMAP app password
    to: ""               # your own address; blank disables even when enabled
    smtp_host: smtp.gmail.com
    smtp_port: 465

# --- Health heartbeat ---
health:
  # The daily 6:00 AM heartbeat fires a notification (see `notifications:`) when
  # a signal (ingestion / staleness / oauth / a degraded source) stays degraded
  # for this many CONSECUTIVE checks. It fires once per streak, then stays quiet
  # until the signal recovers and degrades again. Default 3.
  escalation_consecutive_threshold: 3
  # Owner-idle alarm: the heartbeat flags "running unattended" when your most
  # recent HUMAN action (touching the UI -- sync, expand, status change, rescore,
  # edit notes, ...) is older than this many days while the schedulers keep
  # firing. Catches the tool quietly rotting after you've drifted away. Set 0 to
  # disable. Default 14.
  owner_idle_days: 14
  # Score-rot alarm: the heartbeat re-derives every stored verdict from its saved
  # sub-scores under today's thresholds (zero AI calls) and flags when at least
  # this FRACTION of them would now differ -- i.e. the board is carrying verdicts
  # from a stale scoring era. Set > 1 to disable. Default 0.01 (1%).
  score_rot_fraction: 0.01
  # Funnel unexplained-drop alarm: the heartbeat reads the last ingestion run's
  # persisted funnel reconciliation identity and flags when the unexplained drop
  # count exceeds this threshold. The unexplained count is the self-auditing
  # invariant: jobs_in must equal jobs_passed + sum(drop_buckets) + jobs_errored.
  # Any non-zero value indicates a silent-drop bug (a code path that discards a
  # row without incrementing a counter). Set < 0 to disable. Default 0.
  funnel_unexplained_max: 0
  # HTTP statuses treated as auth/anti-bot walls — a scanner hitting one logs a
  # WARNING (visible at INFO) instead of a silent DEBUG, so a blocked board isn't
  # mistaken for an empty one. 404/410 are excluded (handled as board-gone).
  # Empty list disables the promotion.
  auth_block_statuses: [401, 403, 429]
  # Concentration alarm: the heartbeat computes normalized HHI (Herfindahl-Hirschman
  # Index) for surfaced jobs (apply/consider classifications) grouped by employer
  # and by ATS platform. HHI ranges 0 (perfectly even) → 1 (one group holds everything).
  # Rising HHI indicates differentiation eroding onto head incumbents. Fires when
  # either grouping's normalized HHI exceeds this ceiling AND the total surfaced jobs
  # is at least surfaced_concentration_min_jobs (to avoid false alarms on cold-start
  # boards). Set > 1 to disable. Default 0.60.
  surfaced_concentration_ceiling: 0.60
  # Minimum number of surfaced jobs required before the concentration alarm fires.
  # Prevents false alarms on cold-start boards with few jobs. Default 25.
  surfaced_concentration_min_jobs: 25
  # Minimum applied-job sample size before the conversion signal fires.
  # Guards against noise from tiny samples. Set <= 0 to disable the alarm.
  conversion_min_applied: 10
  # Cost-ledger free/paid health watch (Detector C): the heartbeat groups the
  # scoring_costs ledger by provider over this trailing window (days) and flags
  # two regressions -- a paid-provider row appearing (surprise spend) or the
  # free providers vanishing while scoring activity continues (broken free rung).
  # Set <= 0 to disable the entire cost-health check. Default 7.
  cost_health_window_days: 7
  # Minimum total scoring-cost rows (any provider) that must exist in the window
  # before the 'free providers absent' condition is alarmed -- keeps a fresh/idle
  # install with no scoring activity from being flagged. Does NOT gate paid-leak
  # detection (any paid row alarms regardless of activity). Default 1.
  cost_health_min_activity: 1
  # Supply-side per-source deadman alarm: the heartbeat checks ATS scanner fleet
  # and company_scan_log age against the fixed daily ATS-scan window (24h) times
  # tolerance (feed-ingestion recency is owned by the "No ingestion" alarm).
  # Fires when age > window * tolerance. Set <= 0 to disable the deadman.
  # Default 2.0 (allows two missed daily ATS scans).
  source_deadman_tolerance: 2.0

# --- Metrics ---
metrics:
  crawl_latency:
    # Postings discovered more than this many days after their posted_date are
    # treated as cold-start backlog (first scan of a company dumps its open stack)
    # and excluded from the steady-state p50/p95/p99. Aggregators (LinkedIn/
    # Glassdoor/Indeed) have no trustworthy date and are excluded regardless.
    cold_start_exclude_days: 30
  # Fit-floor: a scored job is a "target-set member" when the mean of its six
  # sub-scores is at or above this value AND its classification is not a hard
  # negative (reject/low_signal). This is the frozen target/watch boundary that
  # discovery-recall numbers are measured against. Tunable; 3.5 aligns with
  # scoring.apply_mean_floor (the positive-evidence 'apply' bar).
  fit_floor: 3.5
  # A non-terminal, still-open posting older than this many days with no
  # pursuit activity is a ghost candidate (2026-06-30 METRICS audit).
  ghost_open_days: 30
  # Repost signal: ats_refreshed_at (#575, Greenhouse-only) diverging from
  # posted_date by more than this many days. Ignored until #575 lands.
  ghost_repost_days: 14

# --- AI scoring configuration ---
scoring:
  # How much each factor contributes to the overall score (must sum to 1.0)
  weights:
    title_match: 0.3
    seniority_alignment: 0.2
    location_fit: 0.15
    salary_range: 0.15
    industry_relevance: 0.1
    company_signals: 0.05
    recency: 0.05
  # Jobs scoring below this threshold are auto-dismissed
  min_score_threshold: 40
  # jd_full character threshold for low_signal classification (Phase 2d sub-fix).
  # When enrichment_tier='exhausted' AND length(jd_full) < this value, the job
  # is classified 'low_signal' instead of being rolled into apply/consider/skip
  # via rubric outputs (which are unreliable when the model has no real JD to read).
  low_signal_jd_chars: 1500
  # Positive-evidence thresholds for the 'apply' verdict (issue #210). On the
  # 1-5 ordinal scale, 3 means "neutral / couldn't tell", so 'apply' (the class
  # the user acts on) must require the presence of strength, not just the
  # absence of weakness. A job is 'apply' only when no axis is weak (all >= 3),
  # at least apply_min_strong_axes axes are strong (>= 4), AND the mean of the
  # six sub-scores is at least apply_mean_floor. An all-3s (flat-neutral) vector
  # is classified 'low_signal' instead.
  apply_mean_floor: 3.5
  apply_min_strong_axes: 3
  # Daily API spending cap in USD. Applies only to non-free BYO-key
  # providers in the cascade — Ollama, the two Claude/Gemini CLIs, Groq,
  # Cerebras, and the Anthropic CLI fallback ($0 via Claude.ai subscription)
  # are all in claude_client.FREE_PROVIDERS and never count. In practice
  # this gate trips only on OpenRouter (the cascade-audit judge). M-2 (2026-05-20).
  daily_budget_usd: 10.0
  # Candidate score threshold gating LLM scoring — jobs with a candidate_score
  # below this (computed during initial ingestion) are skipped for full AI scoring.
  candidate_score_threshold: 55
  # Phase 4 rubric variant. 'baseline' uses the production v3 prompt; any
  # other name resolves to job_finder.web.scoring_prompts.variants.<name>.
  # The eval-harness CLI overrides this at runtime via --variant.
  prompt_variant: baseline
  # Per-workload model selection lives under `providers.overrides.<provider>.<workload>`
  # below. The legacy `scoring.models.{low,mid}` block was removed in 2026-05-21
  # — Phase 40 moved that selection to the providers.overrides path and the
  # legacy keys were never read after the move.

# --- Multi-provider model routing (Phase 40 flat schema) ---
# Every call_model() invocation is cascaded: the primary provider is tried
# first, then each entry in fallback_chain in order. Models for each
# workload (quick / score / triage) come from _PROVIDER_DEFAULTS in
# job_finder/web/model_provider.py unless overridden below.
#
# Registered providers (must match _PROVIDER_DEFAULTS keys):
#   ollama | anthropic | gemini | local_bundled |
#   gemini_cli | claude_code_cli | openrouter
#
#
providers:
  primary: ollama              # Provider tried first for every call
  fallback_chain:              # Tried in order if primary fails / schema-invalidates / hits a daily limit
    - gemini                   # BYO API key (free tier)
    - claude_code_cli          # $0 via your Claude.ai subscription (no API key needed)
    - anthropic                # Paid SDK — final emergency only, costs real money
  overrides: {}                # Optional: per-provider per-workload model override, e.g. {ollama: {score: "llama3.1:70b"}}
  daily_limits: {}             # Optional: {provider_name: max_requests_per_day}
  throttle_delays: {}          # Optional: {provider_name: seconds_between_calls}

# --- Cascade recipes (uncomment ONE to replace the providers: block above) ---
#
# Recipe 1 — Ollama-primary cascade (production default per CLAUDE.md).
# Local qwen2.5:14b handles every call at $0; falls through free hosted
# providers before touching paid Anthropic. Requires Ollama installed
# (auto-detected at startup — falls through gracefully if not found).
#
# providers:
#   primary: ollama
#   fallback_chain: [gemini, claude_code_cli, anthropic]
#   overrides:
#     ollama:    {score: qwen2.5:14b}
#     anthropic: {score: claude-sonnet-4-6}
#
# Recipe 2 — Anthropic-only (paid, simplest). No fallback chain.
#
# providers:
#   primary: anthropic
#   fallback_chain: []
#
# Recipe 3 — Gemini-primary free cascade. Best when Ollama isn't installed
# and you want to stay on free tiers. Anthropic is the paid safety net.
#
# providers:
#   primary: gemini
#   fallback_chain: [claude_code_cli, anthropic]

# --- Database ---
db:
  # SQLite database file path (created automatically on first run)
  path: jobs.db

# --- Careers page crawler ---
careers_crawl:
  enabled: true
  # Re-crawl companies after this many days
  freshness_days: 1
  # Origination lane (#220): max never-crawled companies (careers_url present,
  # no apply/consider history yet — often NULL-ATS) added per run so the
  # crawler can *originate* discovery without flooding. ~25/run drains a
  # ~1,000-company backlog in ~6 weeks.
  origination_batch_limit: 25
  # Parallel browser instances for careers page crawling
  max_workers: 4
  # Max "Load more" button clicks per company (prevents runaway loops)
  max_load_more_clicks: 5
  # Max pagination pages to follow per company
  max_pagination_pages: 5
  # Enable Playwright interaction (load-more, pagination, search forms)
  interactive_enabled: true
  # Outbound ATS-link discovery (#453): when a custom career page renders with
  # 0 matched jobs, harvest any embedded Greenhouse/Lever/Ashby/Workday/
  # SmartRecruiters board link from the rendered DOM and promote the company to
  # that existing scanner. Reuses the already-rendered page (no extra crawl).
  ats_link_discovery_enabled: true

# --- ATS (Applicant Tracking System) scanning ---
ats:
  scan_enabled: true
  # Days of the week to run ATS scans (comma-separated, lowercase)
  scan_days: mon,fri
  # Hour of day to run scans (24-hour format)
  scan_hour: 8
  # High-score-history gate: only scan companies whose past jobs include at
  # least one with a v3 sub_score sum >= this threshold. Companies with NO
  # scored jobs yet are exempt (bootstrap pass). Score-based, not
  # classification-based — sub_scores are 6 axes x 1-5 each (sum range 6-30):
  #   >=18 lenient (skips only the bottom ~15%)
  #   >=20 default (skips ~22% of unproductive cohort)
  #   >=22 strict (top 56% of confirmed-hit companies retained)
  high_score_history_threshold: 20
  # Workday per-board pagination budget (pages of 20 postings). Boards larger
  # than this still discover their first workday_max_pages*20 postings, but are
  # marked incomplete so expiry-reconciliation is skipped for the tenant (a
  # partial board must not mass-expire unseen postings). Default 100 ≈ 2,000
  # postings; raise for very large tenants. See issue #216.
  workday_max_pages: 100
  # iCIMS "load more" click budget per board (Playwright-rendered, no public
  # API — see issue #454). Each click reveals another page of postings; the
  # scanner stops after this many clicks or when no control remains. Default 5.
  icims_max_load_more_clicks: 5
  # ATS company identity (URL evidence → live verify → hit)
  # See `.planning/ATS-RECONCILIATION-PLAN.md`. Ingestion stores URL-derived hints as
  # ``pending``; reconciliation promotes to ``hit`` only after API verification.
  identity_reconcile:
    enabled: true
    # When true, run ranking + probes but do not UPDATE companies (shadow metrics).
    shadow: false
    max_unique_urls_per_company: 500
    max_companies_per_promote_run: 500

# --- Application package preparation (issue #599) ---
application:
  # Free-text questions to draft answers for during application package assembly.
  # These are passed to the LLM with the job description and profile to generate
  # tailored answers. Override this list in config.yaml to customize for your
  # target roles/companies.
  draft_questions:
    - "Why do you want to work here?"
    - "Summarize your relevant experience for this role."
    - "What is your greatest professional achievement?"
  # Auto-submit spine (issue #604). Mechanism-agnostic submit orchestrator with
  # config gating, idempotency, target-URL safety, rate limiting, and audit logging.
  # The actual submission mechanism (e.g., MV3 browser extension) is a separate issue.
  auto_submit:
    enabled: false            # master gate, DEFAULT OFF
    daily_limit: 5            # per-day submit cap, reconstructed from the audit ledger
    mechanism: "extension"    # selects the sender behind the seam (separate issue provides it)
    require_strict_target: true

# --- Direct company-posting link (primary-source resolution) ---
direct_link:
  # Apply-button precedence. A 'strict' direct_url (unambiguous title match on
  # the company's own ATS/careers board) always becomes the Apply target.
  # When true, a 'loose' (first-plausible-match) direct link may also become
  # the Apply target; default false keeps loose links on the provenance badge
  # only, until the strict/loose link-quality experiment concludes.
  loose_apply_default: false
  # Scheduled resolver (daily 5:45 AM): batches unresolved jobs by company,
  # fetches each verified ATS board once, and matches every candidate job
  # against it in memory. Strict matches also merge the posting's
  # authoritative fields (salary metadata, posted date, locations).
  resolver:
    enabled: true
    # Skip a job after this many board-match attempts...
    max_attempts: 3
    # ...until its last check is older than this, then re-check (picks up
    # newly discovered / re-keyed company boards without manual resets).
    recheck_days: 30
    # Board fetches per run; the backlog drains across nightly runs.
    max_companies_per_run: 50
    # When the title match is ambiguous, one quick-tier model call (free on
    # the Ollama primary; cascade budget gates protect paid fallbacks) judges
    # which posting is the same job. Only a confident verdict upgrades the
    # loose link to strict + data merge, tagged with a 'primary_source_llm'
    # source label for auditability.
    llm_tiebreak: true
    # Skip the LLM when the board has more candidate postings than this.
    llm_tiebreak_max_board: 40

# --- Scheduler cadence (Phase 42 wizard writes this; Settings allows custom edits) ---
# cadence_preset drives BOTH the ingestion poll AND its enrichment backfill
# (the backfill runs one hour after each ingestion slot so freshly-ingested rows
# get jd_full + scoring same cycle):
#   light    → ingest 08:00            ; enrich 09:00
#   standard → ingest 00:00/08:00/16:00; enrich 01:00/09:00/17:00
#   heavy    → ingest every 4h         ; enrich every 4h + 1h
# Rescheduling takes effect on app restart (no live-reschedule path).
scheduler:
  cadence_preset: standard  # one of: light (1x/day 08:00), standard (3x/day 0/8/16), heavy (6x/day every 4h)

# --- Agentic backfill (nightly 4:15 AM Ollama + DDG + Playwright recovery) ---
agentic:
  # Max jobs processed per run. Each job is ~30-60s (search + render + LLM
  # validation), so this is effectively a runtime budget that keeps the
  # 4:15 AM run clear of careers_crawl at 5:00 AM. Raise to drain a large
  # backlog faster (at the cost of a longer run); default 50.
  batch_limit: 50
  # Inline agentic pass: after each enrichment_backfill run, run ONE batched
  # agentic pass (a single reused Chromium) over the rows that just exhausted
  # the cheaper tiers, so a last-resort JD lands in the same cycle instead of
  # waiting for the nightly agentic_backfill. Set false to disable (the nightly
  # batch still runs). This replaced the old per-row agentic tier that spawned a
  # fresh browser per job.
  inline_enabled: true
  # Cap for the inline pass (defaults to batch_limit when unset). Keep modest so
  # the 3x/day enrichment run stays snappy; overflow drains nightly.
  inline_limit: 50

# --- Development server ---
server:
  # Host to bind Flask to (use 0.0.0.0 to accept connections from other machines)
  host: "127.0.0.1"
  # Port number
  port: 5000
  # Debug mode. Default false: this is a single-user local app, so the
  # interactive Werkzeug debugger is unnecessary and the reloader it implies
  # is a double-process hazard. Set true only when actively debugging.
  debug: false

# --- Unified staleness orchestrator (nightly 2:00 AM) ---
# Consolidates expiry_check / liveness_check into one run that does:
#   B) batch ATS reconciliation (one API call per company with an ATS slug)
#   C) parallel HTTP cascade for remaining unchecked jobs
#   A) time-based stale marking + passive-stage archive
# C runs before A so a same-night HTTP live verdict refreshes last_seen
# before the clock-based detector judges the job.
# See job_finder.web.expiry_checker.run_staleness_check for details.
staleness:
  # Master toggle. Also honored by the deprecated expiry.enabled key for
  # backward compatibility during the migration window.
  enabled: true
  # Phase B: call Lever/Greenhouse/Ashby/Workday/SmartRecruiters list endpoints
  # once per company instead of once per tracked job. Posting-ID set-diff
  # marks jobs missing from the live board as expired.
  batch_ats_enabled: true
  # Phase C: re-check threshold — jobs whose expiry_checked_at is older than
  # this are queued for the cascade. Legacy key expiry.recheck_days is read
  # as a fallback.
  cascade_recheck_days: 3
  # Phase C: ThreadPoolExecutor size. Each worker runs HTTP + regex only;
  # DB writes happen on the orchestrator thread.
  cascade_parallel_workers: 10
  # Phase C: per-request HTTP timeout (seconds).
  cascade_request_timeout_seconds: 8
  # Phase A: days without any liveness evidence (feed re-sighting, ATS board
  # presence, or HTTP live verdict) before a discovered/reviewing job is
  # marked stale (hidden from the default view) and then auto-archived.
  # Jobs in active pipeline stages (applied onward) are never touched.
  stale_threshold_days: 14
  archive_threshold_days: 30

# --- Filtering ---
filters:
  # Additional companies to auto-exclude (merged with the built-in denylist).
  # Matching is on the NORMALIZED company name: case-insensitive and with legal-
  # entity suffixes stripped, so a single entry "Acme" also excludes
  # "Acme, Inc." / "Acme LLC". Add taste-dependent staffing mills or any
  # aggregator/spam "employer" you keep seeing.
  # Built-in seed already excludes known aggregators/re-posters (Virtual
  # Vocations, ProSidian, SynergisticIT) and placeholder names — no need to
  # repeat those here.
  company_denylist: []

# --- Parser auto-heal (default ON) ---
# Declarative-recipe heal: when a source goes DEGRADED, the heal pipeline
# generates a JSON recipe and writes it to <userdata>/heal_overrides/<surface>/.
# Default-on so a broken parser repairs itself without you coming back to it.
# Without a configured LLM provider it does nothing but surface the DEGRADED
# source (no spend, no attempt consumed). Set heal_enabled: false to disable
# entirely. All reads are defensive: config.get('autoheal', {}).get(key, default).
autoheal:
  # Master toggle (default true). Set to false to disable recipe generation
  # and adoption — sources still degrade-and-surface, nothing is generated.
  heal_enabled: true
  # LLM workload tier for recipe generation calls (quick / score / triage).
  heal_provider: quick
  # Maximum heal attempts per source before giving up (status stays DEGRADED).
  heal_max_attempts: 3
  # Hours to wait between heal attempts for the same source.
  heal_backoff_hours: 24
  # Days a source must stay healthy before its heal-attempt budget resets
  # (hygiene backstop; the budget also resets when the legacy parser recovers).
  heal_attempt_reset_days: 30
  # Wall-clock timeout (seconds) for the subprocess corpus-replay validator.
  validate_timeout_s: 30
  # Maintainer-instance only: auto-open an upstream PR (via gh) shipping each
  # adopted recipe as a package default. Leave false unless you maintain the
  # upstream repo — nothing leaves your machine when false (see PRIVACY.md).
  maintainer_auto_pr: false
  # Repository targeted by contribution issue links and the maintainer auto-PR.
  upstream_repo: "Senkichi/job-cannon"
