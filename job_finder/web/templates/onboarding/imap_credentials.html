{% extends "onboarding/_base.html" %}
{% block title %}Gmail IMAP credentials — Onboarding{% endblock %}
{% block content %}
<!-- WIZARD_STEP_IMAP_CREDENTIALS_MARKER -->
<h1 class="text-2xl font-bold text-slate-100 mb-4">Connect Gmail (IMAP)</h1>
<p class="text-slate-300 mb-4">We will ingest job alerts from your Gmail inbox using an app password (no OAuth required).</p>
{% if error %}
  <div class="p-3 bg-red-900/50 border border-red-700 rounded mb-4 text-red-200 text-sm">{{ error }}</div>
{% endif %}
<form method="post" action="{{ url_for('onboarding.imap_credentials') }}" class="space-y-3">
  <div>
    <label class="block text-sm text-slate-200 mb-1">Gmail address</label>
    <input type="email" name="email" value="{{ email | default('') }}" required class="w-full bg-slate-900 border border-slate-700 rounded px-3 py-2 text-slate-100">
  </div>
  <div>
    <label class="block text-sm text-slate-200 mb-1">App password (16 characters with spaces)</label>
    <input type="password" name="app_password" placeholder="xxxx xxxx xxxx xxxx" required class="w-full bg-slate-900 border border-slate-700 rounded px-3 py-2 text-slate-100">
  </div>
  <div class="flex gap-2 pt-2">
    <button type="submit" class="bg-blue-600 hover:bg-blue-500 text-white px-4 py-2 rounded">Test &amp; continue</button>
    <button type="submit" name="skip" value="1" class="bg-slate-700 hover:bg-slate-600 text-slate-200 px-4 py-2 rounded text-sm">Skip for now - set up in Settings</button>
  </div>
</form>
{% endblock %}
