{% extends "onboarding/_base.html" %}
{% block title %}Your search profile — Onboarding{% endblock %}
{% block content %}
<!-- WIZARD_STEP_PROFILE_EDIT_MARKER -->
<h1 class="text-2xl font-bold text-slate-100 mb-4">Your search profile</h1>
<p class="text-slate-300 mb-6">What kind of role are you looking for? We use these for scoring.</p>
<form method="post" action="{{ url_for('onboarding.profile_edit') }}" class="space-y-4">
  <div>
    <label class="block text-sm text-slate-200 mb-1">Target titles (one per line)</label>
    <textarea name="target_titles" rows="3" class="w-full bg-slate-900 border border-slate-700 rounded px-3 py-2 text-slate-100">{{ target_titles | default('') }}</textarea>
  </div>
  <div>
    <label class="block text-sm text-slate-200 mb-1">Target locations (one per line)</label>
    <textarea name="target_locations" rows="3" class="w-full bg-slate-900 border border-slate-700 rounded px-3 py-2 text-slate-100">{{ target_locations | default('') }}</textarea>
  </div>
  <div>
    <label class="block text-sm text-slate-200 mb-1">Skills (one per line - auto-filled from your resume if uploaded)</label>
    <textarea name="skills" rows="4" class="w-full bg-slate-900 border border-slate-700 rounded px-3 py-2 text-slate-100">{{ skills | default('') }}</textarea>
  </div>
  <div>
    <label class="block text-sm text-slate-200 mb-1">Minimum salary (USD)</label>
    <input type="number" name="min_salary" value="{{ min_salary | default('') }}" class="w-full bg-slate-900 border border-slate-700 rounded px-3 py-2 text-slate-100">
  </div>
  <button type="submit" class="bg-blue-600 hover:bg-blue-500 text-white px-4 py-2 rounded">Continue</button>
</form>
{% endblock %}
