<div class="mt-2 ml-6 p-3 bg-slate-800/50 border border-slate-700 rounded-lg">
  {% if error %}
  <p class="text-xs text-red-400">{{ guidance }}</p>
  {% else %}
  <p class="text-sm text-slate-300 mb-2">{{ guidance }}</p>
  {% if actions %}
  <div class="flex flex-wrap gap-2 mt-2">
    {% for action in actions %}
    <form method="post" action="/profile/apply-fix" class="inline">
      <input type="hidden" name="action_type" value="{{ action.type }}">
      <input type="hidden" name="field" value="{{ action.field if action.field is defined else field }}">
      <input type="hidden" name="value" value="{{ action.value }}">
      <button type="submit"
              class="inline-flex items-center gap-1 px-2.5 py-1 bg-violet-800 hover:bg-violet-700 text-violet-100 text-xs rounded-lg transition-colors">
        {% if action.type == "add_skill" %}
          <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
          Add skill: {{ action.value }}
        {% elif action.type == "update_field" %}
          <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg>
          Update: {{ action.value }}
        {% else %}
          {{ action.value }}
        {% endif %}
      </button>
    </form>
    {% endfor %}
  </div>
  {% endif %}
  {% endif %}
</div>
