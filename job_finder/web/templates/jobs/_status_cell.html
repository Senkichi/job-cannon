{# Inline status dropdown. hx-post to /jobs/<key>/status on change. #}
{# This fragment is also returned by POST /jobs/<key>/status for HTMX swap. #}
<select name="pipeline_status"
        hx-post="/jobs/{{ job.dedup_key | urlencode }}/status"
        hx-trigger="change"
        hx-target="this"
        hx-swap="outerHTML"
        hx-on:click="event.stopPropagation()"
        class="appearance-auto bg-slate-700 text-slate-200 text-xs rounded px-2 py-1 border border-slate-500 ring-1 ring-slate-600 focus:outline-none focus:border-indigo-500 cursor-pointer w-full">
  {% for s in pipeline_statuses %}
    <option value="{{ s }}" {% if job.pipeline_status == s %}selected{% endif %}>
      {{ s | replace('_', ' ') | title }}
    </option>
  {% endfor %}
</select>
