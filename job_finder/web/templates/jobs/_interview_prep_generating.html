{# Interview prep generating state — polls every 2s via HTMX until status changes. #}
<div hx-get="{{ url_for('jobs.interview_prep_status', dedup_key=job.dedup_key) }}"
     hx-trigger="every 2s"
     hx-swap="outerHTML"
     class="flex items-center gap-2 text-xs text-slate-400 animate-pulse p-3 bg-slate-800/30 rounded border border-slate-700/30">
  <svg class="w-3 h-3 animate-spin text-violet-400" fill="none" viewBox="0 0 24 24">
    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
  </svg>
  Generating interview prep...
</div>
