{# Resume generating fragment -- HTMX polls every 600ms until done/error.
   hx-trigger is intentionally present so polling continues. #}
<div hx-get="/jobs/{{ dedup_key | urlencode }}/resume/status/{{ gen_id }}"
     hx-trigger="every 600ms"
     hx-target="this"
     hx-swap="outerHTML"
     class="flex items-center gap-2 text-xs text-slate-400 py-1">
  <span class="animate-pulse">&#9679;</span>
  <span>Generating resume...</span>
</div>
