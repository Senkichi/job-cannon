<!-- Collapsible sidebar navigation -->
<nav id="sidebar"
     class="bg-slate-800 flex flex-col transition-all duration-300 w-56 sticky top-0 h-screen overflow-y-auto flex-shrink-0"
     x-data="{ collapsed: false }">

  <!-- Toggle button -->
  <button
    id="sidebar-toggle"
    onclick="toggleSidebar()"
    class="flex items-center justify-end p-3 text-slate-400 hover:text-slate-100 border-b border-slate-700"
    title="Toggle sidebar"
  >
    <svg id="sidebar-icon-expand" class="hidden w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 5l7 7-7 7M5 5l7 7-7 7"/>
    </svg>
    <svg id="sidebar-icon-collapse" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 19l-7-7 7-7m8 14l-7-7 7-7"/>
    </svg>
  </button>

  <!-- App title -->
  <div class="sidebar-label px-4 py-3 border-b border-slate-700">
    <span class="text-slate-100 font-semibold text-lg">Job Cannon</span>
  </div>

  <!-- Nav items -->
  <ul class="flex-1 py-2 space-y-1">

    <!-- Dashboard -->
    <li>
      <a href="{{ url_for('dashboard.index') }}"
         class="flex items-center gap-3 px-3 py-2.5 mx-2 rounded-lg text-slate-300 hover:bg-slate-700 hover:text-slate-100 transition-colors
                {% if request.path.startswith('/dashboard') %}bg-slate-700 text-slate-100{% endif %}">
        <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
        </svg>
        <span class="sidebar-label">Dashboard</span>
      </a>
    </li>

    <!-- Job Board -->
    <li>
      <a href="{{ url_for('jobs.index') }}"
         class="flex items-center gap-3 px-3 py-2.5 mx-2 rounded-lg text-slate-300 hover:bg-slate-700 hover:text-slate-100 transition-colors
                {% if request.path.startswith('/jobs') %}bg-slate-700 text-slate-100{% endif %}">
        <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
        </svg>
        <span class="sidebar-label">Job Board</span>
      </a>
    </li>

    <!-- Pipeline -->
    <li>
      <a href="{{ url_for('pipeline.index') }}"
         class="flex items-center gap-3 px-3 py-2.5 mx-2 rounded-lg text-slate-300 hover:bg-slate-700 hover:text-slate-100 transition-colors
                {% if request.path.startswith('/pipeline') %}bg-slate-700 text-slate-100{% endif %}">
        <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M9 17V7m0 10a2 2 0 01-2 2H5a2 2 0 01-2-2V7a2 2 0 012-2h2a2 2 0 012 2m0 10a2 2 0 002 2h2a2 2 0 002-2M9 7a2 2 0 012-2h2a2 2 0 012 2m0 10V7m0 10a2 2 0 002 2h2a2 2 0 002-2V7a2 2 0 00-2-2h-2a2 2 0 00-2 2"/>
        </svg>
        <span class="sidebar-label">Pipeline</span>
      </a>
    </li>

    <!-- Companies -->
    <li>
      <a href="{{ url_for('companies.index') }}"
         class="flex items-center gap-3 px-3 py-2.5 mx-2 rounded-lg text-slate-300 hover:bg-slate-700 hover:text-slate-100 transition-colors
                {% if request.path.startswith('/companies') %}bg-slate-700 text-slate-100{% endif %}">
        <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/>
        </svg>
        <span class="sidebar-label">Companies</span>
      </a>
    </li>

    <!-- Profile -->
    <li>
      <a href="{{ url_for('profile.index') }}"
         class="flex items-center gap-3 px-3 py-2.5 mx-2 rounded-lg text-slate-300 hover:bg-slate-700 hover:text-slate-100 transition-colors
                {% if request.path.startswith('/profile') %}bg-slate-700 text-slate-100{% endif %}">
        <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
        </svg>
        <span class="sidebar-label">Profile</span>
      </a>
    </li>

    <!-- Costs -->
    <li>
      <a href="{{ url_for('costs.index') }}"
         class="flex items-center gap-3 px-3 py-2.5 mx-2 rounded-lg text-slate-300 hover:bg-slate-700 hover:text-slate-100 transition-colors

        <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/>
        </svg>
        <span class="sidebar-label">API Activity</span>
      </a>
    </li>

    <!-- Settings -->
    <li>
      <a href="{{ url_for('settings.index') }}"
         class="flex items-center gap-3 px-3 py-2.5 mx-2 rounded-lg text-slate-300 hover:bg-slate-700 hover:text-slate-100 transition-colors
                {% if request.path.startswith('/settings') %}bg-slate-700 text-slate-100{% endif %}">
        <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
        </svg>
        <span class="sidebar-label">Settings</span>
      </a>
    </li>

  </ul>

  <!-- Sync Now button at bottom -->
  <div class="p-3 border-t border-slate-700">
    <button
      hx-post="{{ url_for('sync.sync_start') }}"
      hx-swap="none"
      class="flex items-center gap-2 w-full px-3 py-2.5 rounded-lg bg-indigo-600 hover:bg-indigo-500 text-white text-sm font-medium transition-colors"
      title="Sync jobs from all sources"
    >
      <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
      </svg>
      <span class="sidebar-label">Sync Now</span>
    </button>
  </div>

</nav>

<script>
function toggleSidebar() {
  const sidebar = document.getElementById('sidebar');
  const labels = sidebar.querySelectorAll('.sidebar-label');
  const iconExpand = document.getElementById('sidebar-icon-expand');
  const iconCollapse = document.getElementById('sidebar-icon-collapse');
  const isCollapsed = sidebar.classList.contains('w-16');

  if (isCollapsed) {
    // Expand
    sidebar.classList.remove('w-16');
    sidebar.classList.add('w-56');
    labels.forEach(el => el.classList.remove('hidden'));
    iconExpand.classList.add('hidden');
    iconCollapse.classList.remove('hidden');
  } else {
    // Collapse to icon-only
    sidebar.classList.remove('w-56');
    sidebar.classList.add('w-16');
    labels.forEach(el => el.classList.add('hidden'));
    iconExpand.classList.remove('hidden');
    iconCollapse.classList.add('hidden');
  }
}
</script>
