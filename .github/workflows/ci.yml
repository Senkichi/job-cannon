# Runs on every push to main (the canonical workflow) and on PRs if anyone
# ever opens one. Lint + tests run in parallel.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  # ── Lint + Format Check ──────────────────────────────────────
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.13"
          enable-cache: true

      - name: Install dev tools
        run: uv pip install --system ruff

      - run: ruff check .
      - run: ruff format --check .


  # ── Tests ────────────────────────────────────────────────────
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.13"
          enable-cache: true

      - name: Install dependencies
        run: |
          uv pip install --system -r requirements.txt

      - name: Run tests
        # Invoke pytest via `uv run` so the action's uv-managed Python is
        # used (the same one `uv pip install --system` installed pytest
        # into). Bare `python` on Windows runners points at a pre-installed
        # Python that has no project deps; bare `pytest` collides with the
        # AppInstaller stub. `uv run` resolves both.
        run: uv run pytest -q --tb=short


  # ── Pre-commit Validation ────────────────────────────────────
  pre-commit:
    name: Pre-commit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - uses: pre-commit/action@v3.0.1
