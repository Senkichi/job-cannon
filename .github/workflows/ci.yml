# Runs on every push to main (the canonical workflow) and on PRs if anyone
# ever opens one. Lint + tests run in parallel.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  # ── Lint + Format Check ──────────────────────────────────────
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.13"
          enable-cache: true

      # Use uvx so we don't need a system 3.13 Python and don't need a venv
      # for a pure CLI tool. uvx fetches ruff into a uv-managed cache.
      - run: uvx ruff check .
      - run: uvx ruff format --check .


  # ── Tests ────────────────────────────────────────────────────
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.13"
          enable-cache: true

      # `uv sync` resolves against pyproject.toml + uv.lock and installs
      # into a uv-managed .venv/ — no system Python 3.13 needed. The
      # --extra flags pull in dev (pytest, pytest-cov, pytest-playwright,
      # python-dotenv) and eval (numpy, scipy) groups so tests/test_shootout_lib
      # imports keep working.
      - name: Install dependencies
        run: uv sync --extra dev --extra eval

      # Playwright Python is installed by --extra dev (pytest-playwright
      # depends on it), but the browser binaries are NOT — they live
      # outside the package wheels. tests/e2e/test_smoke.py launches a
      # real Chromium, so without this step the e2e tier errors out
      # with "Executable doesn't exist".
      - name: Install Playwright browsers
        run: uv run playwright install chromium

      # Many tests load the job_finder config from the user-data dir
      # (resolution order: explicit path -> $JOB_CANNON_CONFIG -> user-data
      # dir). A clean CI runner has no config there, so ~25+ unit tests fail
      # with ConfigNotFoundError (the dev machine has one, which is why the
      # local gate is green but CI was red). Seed the committed example config
      # into the resolved user-data path (cross-platform via the package's own
      # resolver) so the suite is hermetic.
      - name: Seed default config
        shell: bash
        run: uv run python -c "import shutil; from pathlib import Path; from job_finder.web import user_data_dirs; user_data_dirs.ensure_user_data_dir(); dst=Path(user_data_dirs.config_path()); shutil.copyfile('config.example.yaml', dst); print('seeded config ->', dst)"

      # Parallelized with pytest-xdist (in the dev extra). --dist loadscope
      # keeps same-module tests on one worker so module-scoped fixtures
      # (DB tempfiles, autouse mocks) stay isolated — the same mode the
      # bhokaral worker self-test uses, proven flake-free vs the serial
      # baseline. Coverage upload removed (Codecov app not installed, token
      # absent → the step was a no-op; dropping --cov also speeds both legs).
      - name: Run tests
        run: uv run pytest -n auto --dist loadscope -q --tb=short


  # ── Pre-commit Validation ────────────────────────────────────
  pre-commit:
    name: Pre-commit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - uses: pre-commit/action@v3.0.1
