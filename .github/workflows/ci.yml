# Runs on every push to main (the canonical workflow) and on PRs if anyone
# ever opens one. Lint + tests run in parallel.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  # ── Lint + Format Check ──────────────────────────────────────
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.13"
          enable-cache: true

      # Use uvx so we don't need a system 3.13 Python and don't need a venv
      # for a pure CLI tool. uvx fetches ruff into a uv-managed cache.
      - run: uvx ruff check .
      - run: uvx ruff format --check .


  # ── Tests ────────────────────────────────────────────────────
  test:
    name: Test (${{ matrix.os }}${{ matrix.name_suffix }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      # ubuntu runs the full suite in one job (~4 min). The Windows leg was the
      # ~24 min wall-clock long pole, so it's SHARDED 4 ways via pytest-split:
      # each runner runs ~1/4 of the tests serially (separate machines — none
      # of the in-process xdist spawn overhead that made #72 slower), cutting
      # Windows wall-clock to ~6-8 min with zero coverage loss (every test still
      # runs). Individual job names change (e.g. "Test (windows-latest 1/4)"),
      # so branch protection gates on the aggregate "Tests passed" job below
      # rather than these matrix legs.
      #
      # The extra ubuntu-3.12 leg validates the minimum supported floor
      # (requires-python = ">=3.12"). Windows legs stay on 3.13 to keep
      # CI wall-clock reasonable.
      matrix:
        include:
          - { os: ubuntu-latest, python_version: "3.13", name_suffix: "", pytest_args: "" }
          - { os: ubuntu-latest, python_version: "3.12", name_suffix: " (py3.12)", pytest_args: "" }
          - { os: windows-latest, python_version: "3.13", name_suffix: " 1/4", pytest_args: "--splits 4 --group 1" }
          - { os: windows-latest, python_version: "3.13", name_suffix: " 2/4", pytest_args: "--splits 4 --group 2" }
          - { os: windows-latest, python_version: "3.13", name_suffix: " 3/4", pytest_args: "--splits 4 --group 3" }
          - { os: windows-latest, python_version: "3.13", name_suffix: " 4/4", pytest_args: "--splits 4 --group 4" }
    steps:
      - uses: actions/checkout@v7

      - uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python_version }}
          enable-cache: true

      # `uv sync` resolves against pyproject.toml + uv.lock and installs
      # into a uv-managed .venv/ keyed to matrix.python_version — no system
      # Python needed. The --extra flags pull in dev (pytest, pytest-cov,
      # pytest-playwright, python-dotenv) and eval (numpy, scipy) groups so
      # tests/test_shootout_lib imports keep working.
      - name: Install dependencies
        run: uv sync --extra dev --extra eval

      # Playwright Python is installed by --extra dev (pytest-playwright
      # depends on it), but the browser binaries are NOT — they live
      # outside the package wheels. tests/e2e/test_smoke.py launches a
      # real Chromium, so without this step the e2e tier errors out
      # with "Executable doesn't exist".
      - name: Install Playwright browsers
        run: uv run playwright install chromium

      # Many tests load the job_finder config from the user-data dir
      # (resolution order: explicit path -> $JOB_CANNON_CONFIG -> user-data
      # dir). A clean CI runner has no config there, so ~25+ unit tests fail
      # with ConfigNotFoundError (the dev machine has one, which is why the
      # local gate is green but CI was red). Seed the committed example config
      # into the resolved user-data path (cross-platform via the package's own
      # resolver) so the suite is hermetic.
      - name: Seed default config
        shell: bash
        run: uv run python -c "import shutil; from pathlib import Path; from job_finder.web import user_data_dirs; user_data_dirs.ensure_user_data_dir(); dst=Path(user_data_dirs.config_path()); shutil.copyfile('config.example.yaml', dst); print('seeded config ->', dst)"

      # Serial WITHIN each runner via an EXPLICIT `-n0` that overrides the
      # `-n auto` default baked into pyproject's addopts. In-process xdist made
      # the 2-core Windows runner slower (spawn-based per-worker import overhead
      # — see #72), so CI opts out here while local/dev runs stay parallel by
      # default. Cross-runner parallelism comes from pytest-split sharding
      # (matrix.pytest_args = "--splits 4 --group K" on Windows; empty on
      # ubuntu = full suite). Coverage upload stays removed (Codecov app/token
      # absent, the step was a no-op).
      - name: Run tests
        run: uv run pytest -q --tb=short -n0 ${{ matrix.pytest_args }}


  # ── Aggregate test gate ──────────────────────────────────────
  # ONE stable required-status-check context for branch protection. The Test
  # matrix is sharded (job names like "Test (windows-latest 1/4)"), so pinning
  # protection to individual legs would break whenever the shard count changes.
  # This job succeeds iff EVERY Test matrix leg succeeded; branch protection
  # requires "Tests passed" instead of the individual legs. `if: always()`
  # ensures it runs (and reports a concrete pass/fail) even when a shard fails,
  # rather than being skipped — a skipped required check would wedge merges.
  tests-passed:
    name: Tests passed
    needs: [test]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Verify all test shards passed
        run: |
          if [ "${{ needs.test.result }}" != "success" ]; then
            echo "Test matrix result: ${{ needs.test.result }} (a shard failed or was cancelled)"
            exit 1
          fi
          echo "All test shards passed."


  # ── Pre-commit Validation ────────────────────────────────────
  pre-commit:
    name: Pre-commit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - uses: pre-commit/action@v3.0.1
