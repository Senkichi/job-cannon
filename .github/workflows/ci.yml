# Runs on every push to main (the canonical workflow) and on PRs if anyone
# ever opens one. Lint + tests run in parallel.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  # ── Lint + Format Check ──────────────────────────────────────
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.13"
          enable-cache: true

      # Use uvx so we don't need a system 3.13 Python and don't need a venv
      # for a pure CLI tool. uvx fetches ruff into a uv-managed cache.
      - run: uvx ruff check .
      - run: uvx ruff format --check .


  # ── Tests ────────────────────────────────────────────────────
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.13"
          enable-cache: true

      # Use a uv-managed venv (instead of `--system`) so we don't depend on
      # a system 3.13 install being present on the runner. setup-uv brings
      # 3.13 via uv; `uv venv` creates `.venv/` against that Python; the
      # subsequent `uv run` resolves to it on both Linux and Windows.
      - name: Create venv and install dependencies
        run: |
          uv venv
          uv pip install -r requirements.txt

      - name: Run tests
        run: uv run pytest -q --tb=short


  # ── Pre-commit Validation ────────────────────────────────────
  pre-commit:
    name: Pre-commit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - uses: pre-commit/action@v3.0.1
