# .github/workflows/publish-testpypi.yml
#
# Pre-release-tag-triggered TestPyPI rehearsal pipeline. Mirrors publish.yml
# but routes to test.pypi.org and skips the GH Release step. Used for the
# v5.0.0rc1 rehearsal before v5.0.0 GA (D-05).
#
# Trigger patterns (PEP 440 canonical pre-release markers):
#   - v*a*   → alpha (v5.0.0a1, v5.1.0a2)
#   - v*b*   → beta  (v5.0.0b1)
#   - v*rc*  → release candidate (v5.0.0rc1)
#
# Trusted publishing: separate registration on test.pypi.org against
# (owner=Senkichi, repo=job-cannon, workflow=publish-testpypi.yml,
# environment=testpypi). Same OIDC mechanism as publish.yml.
#
# Phase 45-03 restructure (PYPI-04 / PYPI-05 / PYPI-06):
#   build → smoke matrix (ubuntu/macos/windows) + smoke-local-ai-windows → publish-testpypi
#   The same `dist` artifact flows through every job (D-10). publish-testpypi
#   requires ALL smoke jobs; a failure on any OS blocks the TestPyPI upload
#   (T-45-03-02 mitigation, mirrored to the rehearsal channel).
#   `id-token: write` stays scoped to the publish-testpypi job only — never
#   workflow-level (T-45-03-01).

name: Publish to TestPyPI (pre-release rehearsal)

on:
  push:
    tags:
      - 'v*a*'
      - 'v*b*'
      - 'v*rc*'

permissions:
  contents: read

jobs:
  # ── Pre-flight: fail fast if the TestPyPI trusted publisher isn't registered ──
  #
  # #406 mirror: same invalid-publisher failure mode as publish.yml, but on the
  # test.pypi.org channel. A brand-new (404) project on TestPyPI needs a PENDING
  # publisher registered before the first pre-release tag is pushed, else the
  # OIDC exchange fails after the environment gate. Cheap unauthenticated read
  # of the TestPyPI JSON API; only detects the project-missing case (PyPI has no
  # public endpoint to introspect publisher config). Non-destructive.
  preflight:
    name: Pre-flight (TestPyPI publisher)
    runs-on: ubuntu-latest
    steps:
      - name: Verify TestPyPI project exists (pending-publisher sanity check)
        run: |
          code=$(curl -sS -o /dev/null -w '%{http_code}' https://test.pypi.org/pypi/job-cannon/json)
          echo "test.pypi.org/pypi/job-cannon/json -> HTTP ${code}"
          if [[ "${code}" == "404" ]]; then
            echo "::error::TestPyPI project 'job-cannon' does not exist (HTTP 404). A first pre-release publish via trusted publishing requires a PENDING publisher registered BEFORE tagging, or the OIDC exchange fails with 'invalid-publisher' after the environment gate (see issue #406). Register one at https://test.pypi.org/manage/account/publishing/ matching owner=Senkichi, repo=job-cannon, workflow=publish-testpypi.yml, environment=testpypi, then re-run."
            exit 1
          fi
          if [[ "${code}" != "200" ]]; then
            echo "::error::Unexpected HTTP ${code} from TestPyPI while checking project existence; aborting before the gate. Re-run if TestPyPI is having a transient outage."
            exit 1
          fi

  # ── Build sdist + wheel (single producer; D-10 artifact identity) ────
  build:
    name: Build
    needs: [preflight]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.13"
          enable-cache: true

      - name: Build sdist + wheel
        run: uv build

      - name: Validate metadata + long-description rendering
        run: uvx twine check --strict dist/*

      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  # ── Smoke (cross-platform pipx install) ──────────────────────
  smoke:
    name: Smoke (${{ matrix.os }})
    needs: [build]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Resolve wheel path
        shell: bash
        run: |
          WHEEL=$(python -c "import glob,sys; m=glob.glob('dist/job_cannon-*.whl'); print(m[0]) if m else sys.exit('no wheel matched dist/job_cannon-*.whl')")
          echo "WHEEL=$WHEEL" >> $GITHUB_ENV

      - name: Install pipx
        shell: bash
        run: python -m pip install --user pipx

      - name: pipx install base
        shell: bash
        run: pipx install "$WHEEL"

      - name: Verify console script
        shell: bash
        run: job-cannon --help

      # `python` here is the runner's system interpreter — pipx installs into
      # an isolated venv, so the import MUST run with the venv's interpreter
      # (bin/ on POSIX, Scripts/ on Windows).
      - name: Verify package import (inside the pipx venv)
        shell: bash
        run: |
          VENV_PY="$(pipx environment --value PIPX_LOCAL_VENVS)/job-cannon/bin/python"
          [ -f "$VENV_PY" ] || VENV_PY="$(pipx environment --value PIPX_LOCAL_VENVS)/job-cannon/Scripts/python.exe"
          "$VENV_PY" -c "import job_finder"

  # ── Smoke [local-ai] on Windows only (D-07; Phase 39 SC4) ────
  smoke-local-ai-windows:
    name: Smoke [local-ai] (windows-latest)
    needs: [build]
    runs-on: windows-latest
    steps:
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Resolve wheel path
        shell: bash
        run: |
          WHEEL=$(python -c "import glob,sys; m=glob.glob('dist/job_cannon-*.whl'); print(m[0]) if m else sys.exit('no wheel matched dist/job_cannon-*.whl')")
          echo "WHEEL=$WHEEL" >> $GITHUB_ENV

      - name: Install pipx
        shell: bash
        run: python -m pip install --user pipx

      - name: pipx install [local-ai]
        shell: bash
        run: pipx install "${WHEEL}[local-ai]"

      - name: Verify console script
        shell: bash
        run: job-cannon --help

      # Same venv-interpreter rule as the base smoke — llama_cpp lives in the
      # pipx venv, not on the runner's system python.
      - name: Verify llama_cpp importable (inside the pipx venv)
        shell: bash
        run: |
          VENV_PY="$(pipx environment --value PIPX_LOCAL_VENVS)/job-cannon/Scripts/python.exe"
          "$VENV_PY" -c "import llama_cpp; print(llama_cpp.__version__)"

  # ── Publish to TestPyPI (OIDC trusted publishing) ────────────
  publish-testpypi:
    name: Publish to TestPyPI
    needs: [smoke, smoke-local-ai-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write    # OIDC for trusted publishing — JOB-SCOPED ONLY
    environment:
      name: testpypi
      url: https://test.pypi.org/p/job-cannon
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Publish to TestPyPI (OIDC trusted publishing)
        uses: pypa/gh-action-pypi-publish@v1.14.0
        with:
          repository-url: https://test.pypi.org/legacy/
