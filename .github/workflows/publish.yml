# .github/workflows/publish.yml
#
# Tag-triggered PyPI publish pipeline. Fires on any `v*` tag push (which
# comes from release.yml's `cz bump --yes --changelog && git push --follow-tags`,
# or a manual `git tag v5.0.0 && git push --tags`).
#
# Pre-release tags (v*a*, v*b*, v*rc*) are intentionally NOT routed here —
# the guard step below fails fast on those and lets publish-testpypi.yml
# handle them. Glob negation isn't supported in `on.push.tags`, so the
# regex guard is the cleanest split (RESEARCH §Pattern 2 lines 293-299).
#
# Trusted publishing: registered against (owner=Senkichi, repo=job-cannon,
# workflow=publish.yml, environment=pypi) on pypi.org. The OIDC token is
# minted by `pypa/gh-action-pypi-publish` inside the publish step — AFTER
# the environment's required-reviewer gate clears. D-07 / T-44-R1.
#
# D-02: a GitHub Release object is created here, AFTER the PyPI upload
# succeeds. Release exists iff artifact landed on PyPI.
#
# Phase 45-03 restructure (PYPI-04 / PYPI-05 / PYPI-06):
#   build → guard → smoke matrix (ubuntu/macos/windows) + smoke-local-ai-windows → publish
#   The same `dist` artifact flows through every job (D-10). `publish` requires
#   ALL smoke jobs (needs: [smoke, smoke-local-ai-windows]); a failure on any
#   OS blocks the publish, fulfilling T-45-03-02 mitigation.
#   `id-token: write` stays scoped to the `publish` job only — never workflow-
#   level (T-45-03-01).

name: Publish to PyPI

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  # ── Guard against pre-release tags (route those to publish-testpypi.yml) ──
  guard:
    name: Guard against pre-release tags
    runs-on: ubuntu-latest
    steps:
      - name: Reject pre-release tags
        run: |
          if [[ "${GITHUB_REF_NAME}" =~ (a|b|rc)[0-9]+$ ]]; then
            echo "::error::Pre-release tag ${GITHUB_REF_NAME} — handled by publish-testpypi.yml, aborting GA publish."
            exit 1
          fi

  # ── Pre-flight: fail fast if the PyPI trusted publisher isn't registered ──
  #
  # #406: v5.1.0's first publish died with `invalid-publisher` AFTER the
  # environment gate was approved — the trusted publisher had never been
  # registered on PyPI, and a brand-new (404) project requires a *pending*
  # publisher. That failure mode is silent until the OIDC exchange in the
  # publish step, by which point the build + 4-way smoke matrix have already
  # run and a human has clicked through the `pypi` environment gate.
  #
  # This job is a cheap, unauthenticated read of the PyPI JSON API. It can
  # only detect the *project-missing* case (the most common cause of
  # invalid-publisher on a first release) — PyPI exposes no public endpoint
  # to introspect a project's trusted-publisher config, so a project that
  # exists but has a *misconfigured* publisher still surfaces at the OIDC
  # exchange. The error message below points at the manual checklist in
  # CONTRIBUTING.md ("Releasing") for that case. Non-destructive: read-only,
  # no credentials, no side effects.
  preflight:
    name: Pre-flight (PyPI publisher)
    needs: [guard]
    runs-on: ubuntu-latest
    steps:
      - name: Verify PyPI project exists (pending-publisher sanity check)
        run: |
          code=$(curl -sS -o /dev/null -w '%{http_code}' https://pypi.org/pypi/job-cannon/json)
          echo "pypi.org/pypi/job-cannon/json -> HTTP ${code}"
          if [[ "${code}" == "404" ]]; then
            echo "::error::PyPI project 'job-cannon' does not exist (HTTP 404). A first publish via trusted publishing requires a PENDING publisher registered BEFORE tagging — otherwise the OIDC exchange fails with 'invalid-publisher' after the environment gate is approved (this is exactly what stalled v5.1.0; see issue #406). Register one at https://pypi.org/manage/account/publishing/ matching owner=Senkichi, repo=job-cannon, workflow=publish.yml, environment=pypi, then re-run."
            exit 1
          fi
          if [[ "${code}" != "200" ]]; then
            echo "::error::Unexpected HTTP ${code} from PyPI while checking project existence; aborting before the gate. Re-run if PyPI is having a transient outage."
            exit 1
          fi
          echo "Project exists on PyPI — trusted publisher should already be registered. If the publish step still fails with 'invalid-publisher', the publisher config is mismatched: verify owner=Senkichi, repo=job-cannon, workflow=publish.yml, environment=pypi at https://pypi.org/manage/project/job-cannon/settings/publishing/"

  # ── Build sdist + wheel (single producer; D-10 artifact identity) ────
  build:
    name: Build
    needs: [preflight]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.13"
          enable-cache: true

      - name: Build sdist + wheel
        run: uv build

      - name: Validate metadata + long-description rendering
        run: uvx twine check --strict dist/*

      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  # ── Smoke (cross-platform pipx install) ──────────────────────
  smoke:
    name: Smoke (${{ matrix.os }})
    needs: [build]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      # PowerShell does NOT glob-expand args to external commands [VERIFIED:
      # PowerShell#3931]. Resolve the wheel path via Python — works identically
      # on all three runners (D-10 / RESEARCH Pattern 3).
      - name: Resolve wheel path
        shell: bash
        run: |
          WHEEL=$(python -c "import glob,sys; m=glob.glob('dist/job_cannon-*.whl'); print(m[0]) if m else sys.exit('no wheel matched dist/job_cannon-*.whl')")
          echo "WHEEL=$WHEEL" >> $GITHUB_ENV

      - name: Install pipx
        shell: bash
        run: python -m pip install --user pipx

      - name: pipx install base
        shell: bash
        run: pipx install "$WHEEL"

      - name: Verify console script
        shell: bash
        run: job-cannon --help

      # `python` here is the runner's system interpreter — pipx installs into
      # an isolated venv, so the import MUST run with the venv's interpreter
      # (first publish run failed on exactly this; bin/ on POSIX, Scripts/ on
      # Windows).
      - name: Verify package import (inside the pipx venv)
        shell: bash
        run: |
          VENV_PY="$(pipx environment --value PIPX_LOCAL_VENVS)/job-cannon/bin/python"
          [ -f "$VENV_PY" ] || VENV_PY="$(pipx environment --value PIPX_LOCAL_VENVS)/job-cannon/Scripts/python.exe"
          "$VENV_PY" -c "import job_finder"

  # ── Smoke [local-ai] on Windows only (D-07; Phase 39 SC4) ────
  smoke-local-ai-windows:
    name: Smoke [local-ai] (windows-latest)
    needs: [build]
    runs-on: windows-latest
    steps:
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Resolve wheel path
        shell: bash
        run: |
          WHEEL=$(python -c "import glob,sys; m=glob.glob('dist/job_cannon-*.whl'); print(m[0]) if m else sys.exit('no wheel matched dist/job_cannon-*.whl')")
          echo "WHEEL=$WHEEL" >> $GITHUB_ENV

      - name: Install pipx
        shell: bash
        run: python -m pip install --user pipx

      - name: pipx install [local-ai]
        shell: bash
        run: pipx install "${WHEEL}[local-ai]"

      - name: Verify console script
        shell: bash
        run: job-cannon --help

      # Same venv-interpreter rule as the base smoke — llama_cpp lives in the
      # pipx venv, not on the runner's system python.
      - name: Verify llama_cpp importable (inside the pipx venv)
        shell: bash
        run: |
          VENV_PY="$(pipx environment --value PIPX_LOCAL_VENVS)/job-cannon/Scripts/python.exe"
          "$VENV_PY" -c "import llama_cpp; print(llama_cpp.__version__)"

  # ── Publish to PyPI (OIDC trusted publishing) ────────────────
  publish:
    name: Publish to PyPI
    needs: [smoke, smoke-local-ai-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write    # for `gh release create`
      id-token: write    # OIDC for trusted publishing — JOB-SCOPED ONLY
    environment:
      name: pypi
      url: https://pypi.org/p/job-cannon
    steps:
      - uses: actions/checkout@v7

      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI (OIDC trusted publishing)
        uses: pypa/gh-action-pypi-publish@v1.14.0

      - name: Create GitHub Release with artifacts attached
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --generate-notes \
            dist/*.tar.gz dist/*.whl
