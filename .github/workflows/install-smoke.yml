# .github/workflows/install-smoke.yml
#
# Install-only RUNTIME smoke (issue #457). Distinct from, and additive to:
#   - install-validate.yml -- pipx `--help` + `import job_finder` only; it never
#     BOOTS the app, so the runtime invariants that break on a fresh install
#     (health endpoint reachable, full scheduler job set registered, ingestion
#     runnable with zero credentials) are unverified there.
#   - ci.yml -- runs the pytest suite from source, not from an installed wheel.
#   - #394's manual clean-VM UAT -- credentialed; that stays the human residue.
#
# Per OS (ubuntu/macos/windows) this installs the freshly built wheel via pipx
# and, INSIDE the pipx venv interpreter, runs scripts/install_smoke.py against a
# clean temp user-data dir with ZERO credentials. The smoke asserts:
#   1. GET /__jc_health -> 200 (launcher identity marker reachable)
#   2. register_all_jobs() registers the expected scheduled-job count, and the
#      two completion-chained successors are absent
#   3. one $0 fully-mocked ingestion returns jobs_new == 0 without raising
# No real port bind, no Ollama, no Gmail/SerpAPI, no model-provider call.
#
# This intentionally nicks the "no CI/CD for runtime" stance for install-smoke
# only. Automated-ready prep for #394.

name: Install Smoke (cross-OS runtime boot)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  # ── Build sdist + wheel (single producer) ────────────────────
  build:
    name: Build (ubuntu-latest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.13"
          enable-cache: true

      - name: Build sdist + wheel
        run: uv build

      - name: Validate metadata + long-description rendering
        run: uvx twine check --strict dist/*

      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  # ── Runtime smoke (cross-platform pipx install + boot) ───────
  smoke:
    name: Smoke (${{ matrix.os }})
    needs: [build]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      # Unlike install-validate.yml's smoke (wheel-only), this lane needs the
      # repo source on disk: scripts/install_smoke.py and config.example.yaml are
      # not packaged into the wheel.
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      # PowerShell does NOT glob-expand args to external commands; resolve the
      # wheel path via Python so it works identically on all three runners.
      - name: Resolve wheel path
        shell: bash
        run: |
          WHEEL=$(python -c "import glob,sys; m=glob.glob('dist/job_cannon-*.whl'); print(m[0]) if m else sys.exit('no wheel matched dist/job_cannon-*.whl')")
          echo "WHEEL=$WHEEL" >> $GITHUB_ENV

      - name: Install pipx
        shell: bash
        run: python -m pip install --user pipx

      - name: pipx install base
        shell: bash
        run: pipx install "$WHEEL"

      # pipx installs into an isolated venv; the smoke MUST run with that venv's
      # interpreter (bin/ on POSIX, Scripts/ on Windows) so job_finder + its
      # runtime deps resolve from the installed wheel, not the runner's system
      # Python.
      - name: Resolve pipx venv interpreter
        shell: bash
        run: |
          VENV_PY="$(pipx environment --value PIPX_LOCAL_VENVS)/job-cannon/bin/python"
          [ -f "$VENV_PY" ] || VENV_PY="$(pipx environment --value PIPX_LOCAL_VENVS)/job-cannon/Scripts/python.exe"
          echo "VENV_PY=$VENV_PY" >> $GITHUB_ENV

      # Belt-and-suspenders: the smoke passes its config dict directly (and points
      # JOB_CANNON_USER_DATA_DIR at a temp dir), so it never reads config.yaml --
      # but seeding the example config keeps the resolved user-data path valid for
      # any incidental config read during boot. Mirrors ci.yml's seed step.
      - name: Seed default config
        shell: bash
        run: |
          "$VENV_PY" -c "import shutil; from pathlib import Path; from job_finder.web import user_data_dirs; user_data_dirs.ensure_user_data_dir(); dst=Path(user_data_dirs.config_path()); shutil.copyfile('config.example.yaml', dst); print('seeded config ->', dst)"

      - name: Run install smoke (inside the pipx venv)
        shell: bash
        run: |
          "$VENV_PY" scripts/install_smoke.py

  # ── Aggregate gate ───────────────────────────────────────────
  # ONE stable required-status-check context for branch protection, mirroring
  # ci.yml's "Tests passed". Succeeds iff every matrix leg succeeded; `if:
  # always()` ensures it reports a concrete pass/fail even when a leg fails
  # (a skipped required check would wedge merges).
  install-smoke-passed:
    name: Install smoke passed
    needs: [smoke]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Verify all smoke legs passed
        run: |
          if [ "${{ needs.smoke.result }}" != "success" ]; then
            echo "Smoke matrix result: ${{ needs.smoke.result }} (a leg failed or was cancelled)"
            exit 1
          fi
          echo "All install-smoke legs passed."
