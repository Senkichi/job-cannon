# Claude Code responds to @claude mentions in PR/issue comments.
#
# Prerequisites:
#   1. Add ANTHROPIC_API_KEY as a repository secret
#      (Settings > Secrets and variables > Actions > New repository secret)

name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  claude:
    # Restrict to repo owner only. Single-user repo; without this filter
    # any GitHub user can burn ANTHROPIC_API_KEY by commenting @claude on
    # an issue or PR review.
    if: |
      github.event.comment.author_association == 'OWNER' &&
      contains(github.event.comment.body, '@claude')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
