# Defines which checks run before every commit (and on commit messages).
# Install once per clone: git config core.hooksPath .githooks
# Update hook versions: uv run pre-commit autoupdate
# Run against all files: uv run pre-commit run --all-files

default_install_hook_types:
  - pre-commit
  - commit-msg

# GSD planning artifacts and review tool working directories are excluded —
# they're machine-generated metadata where formatting/whitespace diffs add noise.
exclude: |
  (?x)^(
    \.planning/.*|
    \.reviews/.*|
    \.nit/.*|
    \.nit-supreme/.*|
    \.superpowers/.*|
    \.playwright-mcp/.*|
    eval_results/.*|
    logs/.*|
    data/.*|
    reports/.*
  )$

repos:
  # ── Guardrails ──────────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-ast
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: check-toml
      - id: check-yaml
      - id: check-json
      - id: check-added-large-files
        args: ['--maxkb=500']
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: mixed-line-ending
        args: ['--fix=lf']

  # ── Secret Scanning ─────────────────────────────────────────
  # Catches accidental commits of API keys (Anthropic, SerpAPI, Thordata, Google).
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.22.1
    hooks:
      - id: gitleaks

  # ── Linting + Formatting ────────────────────────────────────
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  # ── Commit Message Validation ───────────────────────────────
  # Enforces conventional commits (feat/fix/refactor/etc.) so release.yml
  # can auto-generate changelogs and bump versions.
  - repo: https://github.com/commitizen-tools/commitizen
    rev: v4.1.0
    hooks:
      - id: commitizen
        stages: [commit-msg]

  # ── Type Checking (manual-stage, opt-in) ────────────────────
  # Runs the active baseline type-checker (mypy) over the whole
  # job_finder/ package. Pinned to stages: [manual] so it does NOT
  # gate every commit while the baseline error count is still
  # being driven down (Session 5 baseline: 123 errors / 39 files —
  # see docs/architecture/typecheck.md). Promotion to the default
  # pre-commit stage is a Session 9/10 item.
  #
  # To run on demand:
  #   uv run pre-commit run --hook-stage manual --all-files type-check
  - repo: local
    hooks:
      - id: type-check
        name: 'mypy (manual stage — opt-in baseline)'
        entry: uv run --active mypy job_finder
        language: system
        types: [python]
        pass_filenames: false
        stages: [manual]

  # ── Placeholder Discipline (MI-14) ──────────────────────────
  # Block accidental commits of `<<<TODO: REPLACE>>>` and `<<<VERIFY>>>`
  # template markers. The README + repo-metadata templates ship with
  # placeholders that MUST be filled before commit; this hook is the
  # safety net. Reason these exist as a single hook: every other defense
  # (code review, eyeballing the diff, "I'll remember") has been
  # demonstrably unreliable across the portfolio cleanup.
  - repo: local
    hooks:
      - id: no-todo-replace
        name: 'Block <<<TODO: REPLACE>>> and <<<VERIFY>>> markers'
        entry: '<<<(TODO: REPLACE|VERIFY)'
        language: pygrep
        types: [text]
        # Pin to pre-commit stage so the hook scans staged file contents
        # only, not commit messages (which can legitimately mention the
        # markers when describing the hook itself).
        stages: [pre-commit]
        # Exclude this config file (it has to mention the markers
        # literally to define them) and the gitignored planning docs
        # (which contain intentional template drafts).
        exclude: |
          (?x)^(
            \.pre-commit-config\.yaml|
            \.planning/.*
          )$
