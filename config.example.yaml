# Job Cannon Configuration
# Copy this file to config.yaml and customize for your job search.

# --- Your job search profile ---
profile:
  # Job titles you're targeting (matched against listing titles)
  target_titles:
    - Data Scientist
    - Senior Data Scientist
  # Preferred work locations (use "Remote" for remote jobs)
  target_locations:
    - Remote
  # Minimum acceptable salary in USD (jobs below 85% of this are auto-excluded)
  min_salary: 100000
  # Industries you're interested in (used by AI scoring)
  industries:
    - Tech
    - SaaS
  # Exclusion rules — jobs matching these are skipped before AI scoring (zero cost)
  exclusions:
    # Title substrings to exclude (case-insensitive)
    title_keywords:
      - intern
      - junior
    # Specific company names to exclude
    companies: []
  # Your key skills (used by AI for fit scoring)
  skills:
    - Python
    - SQL
  # Job archetype classification — keyword-based categorization for scoring context.
  # Each archetype matches keywords against title+description (case-insensitive).
  # weight_overrides can adjust scoring emphasis per archetype (empty = no override).
  job_archetypes:
    platform_engineering:
      keywords: ["platform", "infrastructure", "kubernetes", "devops"]
      weight_overrides: {}
    ml_engineering:
      keywords: ["machine learning", "ml", "model serving", "feature store"]
      weight_overrides: {}
    analytics_lead:
      keywords: ["analytics", "experimentation", "stakeholder", "roadmap"]
      weight_overrides: {}

# --- Job sources ---
sources:
  imap:
    # IMAP email source (stranger-friendly default - uses app password, no OAuth)
    enabled: true
    host: imap.gmail.com
    port: 993
    email: ""
    app_password: ""
    folder: INBOX
  gmail:
    # Gmail API source (OAuth power-user path - requires python -m job_finder.gmail_auth)
    enabled: false
    # How many days back to search for job alert emails
    lookback_days: 7
    # Sender addresses for job alert emails (defaults work for standard alerts)
    senders:
      linkedin_alerts: jobalerts-noreply@linkedin.com
      linkedin_jobs: jobs-noreply@linkedin.com
      glassdoor: noreply@glassdoor.com
      indeed: alert@indeed.com
      ziprecruiter: no-reply@ziprecruiter.com
  serpapi:
    # Optional: SerpAPI for Google Jobs search (requires paid API key)
    enabled: false
    # Get your key at: https://serpapi.com/manage-api-key
    api_key: ""
    # Max pages to fetch per query (10 results/page, each page = 1 API credit)
    max_pages: 5
    queries:
      - query: Data Scientist
        location: San Francisco Bay Area
  jsearch:
    # Optional: JSearch via RapidAPI (alternative job search)
    enabled: false
    rapidapi_key: ""
  thordata:
    # Optional: Thordata Google Jobs SERP API (cheaper alternative to SerpAPI)
    enabled: false
    # Get your key at: https://www.thordata.com/
    api_key: ""
    # Only ingest jobs posted within this many days
    max_age_days: 3
    queries:
      - query: Data Scientist
        location: San Francisco Bay Area
  dataforseo:
    # Optional: DataForSEO Google Jobs SERP API — full index, ~$0.87/month at default settings
    # Task-queue API (async: submits tasks, polls for completion, no live endpoint).
    enabled: false
    # Credentials: base64(login:password) — copy from https://app.dataforseo.com/api-access
    api_key: ""
    # Results per query (10-200). Each 10 = 1 billing unit ($0.0006 normal / $0.0012 high).
    # depth=200: full index access, ~$0.10/run max with 8 queries, billed per result returned.
    depth: 200
    # Only ingest jobs posted within this many days (uses posting timestamp, not time_ago string)
    max_age_days: 7
    # Task priority: 1=normal (~5 min, $0.0006/10 results), 2=high (~1 min, $0.0012/10 results)
    priority: 1
    # Seconds between poll retries after the 45s initial wait. 0=disable sleeping (tests only).
    poll_interval_seconds: 30
    # Give up waiting after this many seconds. Partial results returned; remainder abandoned.
    poll_timeout_seconds: 360
    queries:
      - query: Data Scientist
        location: San Francisco Bay Area

  portal_search:
    # Niche job portal discovery. Two tiers:
    #   1. Free APIs (RemoteOK, Remotive, Himalayas) — always zero cost.
    #   2. Site: SERP queries via DataForSEO for remaining portals — cheap, batched.
    # SerpAPI/Thordata are NOT used (too expensive for site: queries).
    # If DataForSEO is not enabled, only free API portals are searched.
    enabled: false
    keywords:
      - Staff Engineer
      - ML Platform
      - Data Infrastructure
    # Max DataForSEO site: queries per run (caps SERP spend)
    max_serp_queries: 30

# --- AI scoring configuration ---
scoring:
  # How much each factor contributes to the overall score (must sum to 1.0)
  weights:
    title_match: 0.3
    seniority_alignment: 0.2
    location_fit: 0.15
    salary_range: 0.15
    industry_relevance: 0.1
    company_signals: 0.05
    recency: 0.05
  # Jobs scoring below this threshold are auto-dismissed
  min_score_threshold: 40
  # jd_full character threshold for low_signal classification (Phase 2d sub-fix).
  # When enrichment_tier='exhausted' AND length(jd_full) < this value, the job
  # is classified 'low_signal' instead of being rolled into apply/consider/skip
  # via rubric outputs (which are unreliable when the model has no real JD to read).
  low_signal_jd_chars: 1500
  # Monthly API spending cap in USD (scoring pauses when reached)
  monthly_budget_usd: 25.0
  # Candidate score threshold gating LLM scoring — jobs with a candidate_score
  # below this (computed during initial ingestion) are skipped for full AI scoring.
  candidate_score_threshold: 55
  # Phase 4 rubric variant. 'baseline' uses the production v3 prompt; any
  # other name resolves to job_finder.web.scoring_prompts.variants.<name>.
  # The eval-harness CLI overrides this at runtime via --variant.
  prompt_variant: baseline
  # AI models (defaults are recommended; change only if you know what you're doing)
  models:
    low: claude-haiku-4-5
    mid: claude-sonnet-4-6

# --- Multi-provider model routing (Phase 40 flat schema) ---
# Every call_model() invocation is cascaded: the primary provider is tried
# first, then each entry in fallback_chain in order. Models for each
# workload (quick / score / triage) come from _PROVIDER_DEFAULTS in
# job_finder/web/model_provider.py unless overridden below.
#
# Valid provider names (must match _PROVIDER_DEFAULTS keys):
#   ollama | anthropic | gemini | groq | cerebras | local_bundled |
#   gemini_cli | claude_code_cli
#
providers:
  primary: ollama              # Provider tried first for every call
  fallback_chain:              # Tried in order if primary fails / schema-invalidates / hits a daily limit
    - groq
    - cerebras
    - gemini
    - anthropic
  overrides: {}                # Optional: per-provider per-workload model override, e.g. {ollama: {score: "llama3.1:70b"}}
  daily_limits: {}             # Optional: {provider_name: max_requests_per_day}
  throttle_delays: {}          # Optional: {provider_name: seconds_between_calls}

# --- Cascade recipes (uncomment ONE to replace the providers: block above) ---
#
# Recipe 1 — Ollama-primary cascade (production default per CLAUDE.md).
# Local qwen2.5:14b handles every call at $0; falls through free hosted
# providers before touching paid Anthropic. Requires Ollama running locally.
#
# providers:
#   primary: ollama
#   fallback_chain: [groq, cerebras, gemini, anthropic]
#   overrides:
#     ollama:    {score: qwen2.5:14b}
#     anthropic: {score: claude-sonnet-4-6}
#
# Recipe 2 — Anthropic-only (paid, simplest). No fallback chain.
#
# providers:
#   primary: anthropic
#   fallback_chain: []
#
# Recipe 3 — Gemini-primary free cascade. Best when Ollama isn't installed
# and you want to stay on free tiers. Anthropic is the paid safety net.
#
# providers:
#   primary: gemini
#   fallback_chain: [groq, cerebras, anthropic]

# --- Output settings ---
output:
  default_format: cli
  markdown_path: reports/
  max_results: 50

# --- Database ---
db:
  # SQLite database file path (created automatically on first run)
  path: jobs.db

# --- Careers page crawler ---
careers_crawl:
  enabled: true
  # Re-crawl companies after this many days
  freshness_days: 1
  # Parallel browser instances for careers page crawling
  max_workers: 4
  # Max "Load more" button clicks per company (prevents runaway loops)
  max_load_more_clicks: 5
  # Max pagination pages to follow per company
  max_pagination_pages: 5
  # Enable Playwright interaction (load-more, pagination, search forms)
  interactive_enabled: true

# --- ATS (Applicant Tracking System) scanning ---
ats:
  scan_enabled: true
  # Days of the week to run ATS scans (comma-separated, lowercase)
  scan_days: mon,fri
  # Hour of day to run scans (24-hour format)
  scan_hour: 8
  # ATS company identity (URL evidence → live verify → hit)
  # See `.planning/ATS-RECONCILIATION-PLAN.md`. Ingestion stores URL-derived hints as
  # ``pending``; reconciliation promotes to ``hit`` only after API verification.
  identity_reconcile:
    enabled: true
    # When true, run ranking + probes but do not UPDATE companies (shadow metrics).
    shadow: false
    max_unique_urls_per_company: 500
    max_companies_per_promote_run: 500

# --- Scheduler cadence (Phase 42 wizard writes this; Settings allows custom edits) ---
scheduler:
  cadence_preset: standard  # one of: light (1x/day 08:00), standard (3x/day 0/8/16), heavy (6x/day every 4h)

# --- Development server ---
server:
  # Host to bind Flask to (use 0.0.0.0 to accept connections from other machines)
  host: "127.0.0.1"
  # Port number
  port: 5000
  # Debug mode (set to false in production-like environments)
  debug: true

# --- Stale detection thresholds ---
stale_detection:
  # Days since last_seen before a job is marked stale
  stale_threshold_days: 14
  # Days since last_seen before a passive-stage job is auto-archived
  archive_threshold_days: 30

# --- Unified staleness orchestrator (nightly 2:00 AM) ---
# Replaces the older trio of stale_detection / expiry_check / liveness_check
# scheduled jobs with one run that does:
#   B) batch ATS reconciliation (one API call per company with an ATS slug)
#   A) time-based stale marking + passive-stage archive
#   C) parallel HTTP cascade for remaining unchecked jobs
# See job_finder.web.expiry_checker.run_staleness_check for details.
staleness:
  # Master toggle. Also honored by the deprecated expiry.enabled key for
  # backward compatibility during the migration window.
  enabled: true
  # Phase B: call Lever/Greenhouse/Ashby/Workday/SmartRecruiters list endpoints
  # once per company instead of once per tracked job. Posting-ID set-diff
  # marks jobs missing from the live board as expired.
  batch_ats_enabled: true
  # Phase C: re-check threshold — jobs whose expiry_checked_at is older than
  # this are queued for the cascade. Legacy key expiry.recheck_days is read
  # as a fallback.
  cascade_recheck_days: 3
  # Phase C: ThreadPoolExecutor size. Each worker runs HTTP + regex only;
  # DB writes happen on the orchestrator thread.
  cascade_parallel_workers: 10
  # Phase C: per-request HTTP timeout (seconds).
  cascade_request_timeout_seconds: 8

# --- Filtering ---
filters:
  # Additional companies to auto-exclude (merged with built-in denylist)
  # Add staffing agencies or spam companies you keep seeing
  company_denylist: []
